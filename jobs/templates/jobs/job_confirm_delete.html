{% extends "jobs/base.html" %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg p-8 shadow text-center">
        <p class="text-4xl mb-4">🗑️</p>
        <h2 class="text-xl font-bold mb-2">Delete Application?</h2>
        <p class="text-gray-500 mb-6">
            Are you sure you want to delete 
            <strong>{{ job.job_title }}</strong> at 
            <strong>{{ job.company_name }}</strong>?
            This cannot be undone.
        </p>
        <form method="POST">
            {% csrf_token %}
            <div class="flex gap-3 justify-center">
                <button type="submit"
                    class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600 font-medium">
                    Yes, Delete
                </button>
                <a href="/jobs/"
                    class="bg-gray-200 text-gray-700 px-6 py-2 rounded hover:bg-gray-300 font-medium">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

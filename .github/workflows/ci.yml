name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Django + Celery)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (py compile)
        run: python -m compileall jobs/ jobtracker/

      - name: Django system check
        run: python manage.py check
        env:
          SECRET_KEY: ci-secret-key-for-check-only
          DEBUG: "True"
          DATABASE_URL: sqlite:///db.sqlite3
